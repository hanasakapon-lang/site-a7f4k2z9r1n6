<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luxury Blur Reveal</title>
<style>
  :root{
    --step: 55ms;
    --dur: 1200ms;
    --blur: 10px;
    --y: 0.18em;
  }

  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-content:center;
    background: radial-gradient(80% 80% at 50% 20%, #111827 0%, #06070b 60%, #05060a 100%);
    color:#eef2ff;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    letter-spacing: 0.01em;
  }

  .wrap{
    max-width: 900px;
    padding: 56px 28px;
    text-align:center;
  }

  .headline{
    font-size: clamp(30px, 4.8vw, 54px);
    line-height: 1.12;
    margin: 0 0 16px;
  }

  .sub{
    font-size: clamp(14px, 2vw, 18px);
    line-height: 1.8;
    color: rgba(238,242,255,.76);
  }

  [data-reveal]{
    display:inline-block;
    white-space: pre-wrap;
  }

  .char{
    display:inline-block;
    opacity:0;
    filter: blur(var(--blur));
    transform: translateY(var(--y));
    text-shadow: 0 0 18px rgba(255,255,255,.08);
    will-change: opacity, filter, transform;
    animation: luxe var(--dur) cubic-bezier(.16, 1, .3, 1) forwards;
    animation-delay: var(--d);
  }

  @keyframes luxe{
    0%{
      opacity:0;
      filter: blur(var(--blur));
      transform: translateY(var(--y));
    }
    70%{
      opacity:1;
      filter: blur(1px);
      transform: translateY(0);
    }
    100%{
      opacity:1;
      filter: blur(0);
      transform: translateY(0);
    }
  }

  @media (prefers-reduced-motion: reduce){
    .char{
      animation:none;
      opacity:1;
      filter:none;
      transform:none;
      text-shadow:none;
    }
  }
</style>
</head>
<body>

<div class="wrap">
  <h1 class="headline">
    <span data-reveal>
      静けさの中で、存在感だけを残す。
    </span>
  </h1>

  <p class="sub">
    <span data-reveal>
      こんにちは🌙 你好 안녕하세요 café — 素材の質感と余白を大切にした一品。
    </span>
  </p>
</div>

<script>
function splitGraphemes(text){
  if (Intl && Intl.Segmenter){
    const seg = new Intl.Segmenter(undefined, { granularity: "grapheme" });
    return Array.from(seg.segment(text), s => s.segment);
  }
  return Array.from(text);
}

function buildReveal(el, stepMs){
  const text = el.textContent ?? "";
  const parts = splitGraphemes(text);

  el.textContent = "";
  const frag = document.createDocumentFragment();

  parts.forEach((g, i) => {
    const span = document.createElement("span");
    span.className = "char";
    span.textContent = g;
    span.style.setProperty("--d", `${i * stepMs}ms`);
    frag.appendChild(span);
  });

  el.appendChild(frag);
}

const step = parseInt(getComputedStyle(document.documentElement)
  .getPropertyValue("--step")) || 55;

document.querySelectorAll("[data-reveal]")
  .forEach(el => buildReveal(el, step));
</script>

</body>
</html>
